<!DOCTYPE html>

<head>

    <link rel="stylesheet" th:href="@{/css/style.css}"/>

</head>
<body>
<header>
    <a href="./"><h1>Pix</h1></a>
    <h2 th:text="${title}"></h2>

    </h3>
</header>
<section>

        <tr>

                <a th:href="@{/ksiazki(autorId=${a.id})}" th:text="${a.nazwisko}"></a>
            </td>
        </tr>
    </table>
</section>
<div id="orders">

</div>
<footer th:text="${tip}"></footer>
</body>
</html>
